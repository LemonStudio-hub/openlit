name = "openlit-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "openlit-db"
database_id = "your-database-id"

# R2 存储绑定
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "openlit-storage"

# 环境变量
[vars]
ENVIRONMENT = "development"

# 开发环境配置
[env.development]
name = "openlit-api-dev"

# 生产环境配置
[env.production]
name = "openlit-api-prod"